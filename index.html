    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <title>Mikhail | Digital Workspace</title>
    <meta name="description" content="Personal portfolio and digital workspace. Atmospheric design with a modern glassmorphism aesthetic." />
    
    <!-- Social Media Preview Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mikhail Martynenko | Developer & Educator" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mikhail Martynenko | Developer & Educator" />

    <meta name="twitter:image" content="/mikhail.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            colors: {
              space: {
                dark: '#0B0E14',
                light: '#151921',
              },
              glass: {
                border: 'rgba(255, 255, 255, 0.08)',
                surface: 'rgba(255, 255, 255, 0.05)',
                highlight: 'rgba(255, 255, 255, 0.03)',
              },
              accent: {
                sage: '#9CAF88',
                lavender: '#B8B8D1',
                electric: '#7DF9FF',
              }
            },
            animation: {
              'spin-slow': 'spin 20s linear infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background: linear-gradient(to bottom, #0B0E14, #151921);
        color: #E2E8F0;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B0E14;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
      }

      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

  }
}
</script>
