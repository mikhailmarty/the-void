server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Сжатие Gzip (Критично для SEO и скорости загрузки)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 2. Обработка SPA роутинга
    location / {
        try_files $uri $uri/ /index.html;
        
        # Убираем индексацию для технических страниц (опционально)
        add_header X-Content-Type-Options nosniff;
    }

    # 3. Кэширование статических ассетов (Vite генерирует хеши в именах)
    # Это позволяет браузеру не перекачивать JS/CSS при каждом заходе
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # 4. Явное разрешение для SEO-файлов
    location ~* \.(txt|xml)$ {
        allow all;
    }

    # 5. Ошибка 404 (для SPA перенаправляем на index.html)
    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
